# Publishes the Vite *build* into the docs/ folder on main.
#
# GitHub Pages (this is the reliable combo — avoids root index.html):
#   Settings → Pages → Source: Deploy from a branch
#   Branch: main
#   Folder: /docs   ← NOT “/ (root)”. Root is only for local Vite dev (/src/main.tsx).
#
# Pushes that only change docs/ do not re-run this workflow (paths-ignore).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - env:
          GITHUB_PAGES: 'true'
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Verify build output
        run: |
          test -f dist/index.html
          grep -qE 'assets/index-[^ ]+\.js' dist/index.html
          ! grep -q '/src/main.tsx' dist/index.html
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: main
          destination_dir: docs
