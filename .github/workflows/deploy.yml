# Builds the Vite app and pushes static files to branch `gh-pages`.
#
# GitHub Pages: Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages   Folder: / (root)
#
# Do NOT use "main" + root for this project — main holds source code, not the built site.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - env:
          GITHUB_PAGES: 'true'
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
