# Official GitHub Pages via Actions (no extra branch, no pushing to main).
# Site source lives in web/ so the repo root has no index.html — branch-based Pages
# can’t accidentally serve the Vite dev entry (/src/main.tsx).
#
# One-time: Repo → Settings → Pages → Build and deployment
#   Set "Source" to **GitHub Actions** (not "Deploy from a branch").
#   https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow
#
# If the deploy job asks to approve the "github-pages" environment, approve it once.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # Custom domain (see public/CNAME) serves the site at /. A project-path base
      # like /RepoName/ breaks the app on the apex domain (blank page: JS/CSS 404).
      - env:
          GITHUB_PAGES: 'true'
          GITHUB_PAGES_BASE: /
        run: npm run build
      - name: Verify build output
        run: |
          test -f dist/index.html
          grep -qE 'assets/index-[^ ]+\.js' dist/index.html
          ! grep -q '/src/main.tsx' dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
